<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 16 16"
     shape-rendering="crispEdges">

  <!-- Monitor -->
  <path fill="#2b2b2b" d="M3 2h8v6H3z"/>
  <path fill="#e3e3e3" d="M2 1h8v1H2zm0 2h1v4H2zm8 0h1v4h-1zM2 7h9v1H2z"/>

  <!-- Screen -->
  <rect x="4" y="3" width="6" height="4" fill="#1f77ff"/>

  <!-- Tiny window -->
  <rect x="5" y="4" width="3" height="2" fill="#ffffff"/>
  <rect x="5" y="4" width="3" height="1" fill="#000080"/>

  <!-- Isometric side -->
  <polygon points="11,2 13,3 13,8 11,8"
           fill="#9c9c9c"/>
  <polygon points="10,1 12,2 13,2 11,1"
           fill="#f5f5f5"/>

  <!-- Stand -->
  <rect x="6" y="8" width="2" height="2" fill="#8a8a8a"/>
  <rect x="4" y="10" width="6" height="1" fill="#6f6f6f"/>

  <!-- Keyboard -->
  <polygon points="3,11 10,11 13,13 6,13"
           fill="#d6d6d6"/>
  <polygon points="10,11 13,13 13,14 10,12"
           fill="#9a9a9a"/>

  <!-- Keys -->
  <rect x="5" y="12" width="5" height="1" fill="#b7b7b7"/>

  <!-- Power LED -->
  <rect x="9" y="8" width="1" height="1" fill="#00ff66"/>
</svg>
